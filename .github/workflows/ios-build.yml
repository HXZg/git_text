name: iOS Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS (No Codesign)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: |
          flutter --version
          flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign

      - name: Create iOS IPA (Unsigned)
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r ios_build_unsigned.ipa Payload
          rm -rf Payload

      - name: Upload iOS Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: ios-build-unsigned
          path: ios_build_unsigned.ipa
          retention-days: 14

      - name: Build Summary
        run: |
          echo "## iOS Build Complete ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** This build is unsigned and cannot be installed on devices directly." >> $GITHUB_STEP_SUMMARY
          echo "To create a distributable IPA, you need:" >> $GITHUB_STEP_SUMMARY
          echo "- Apple Developer account" >> $GITHUB_STEP_SUMMARY
          echo "- Provisioning profile and certificate" >> $GITHUB_STEP_SUMMARY
          echo "- Configure code signing in the workflow" >> $GITHUB_STEP_SUMMARY
